<script>

let workspace = null;
let currentLesson = 1;

// ================= LESSON HELPERS =================

function hasPrintWithValue(){
  const blocks = workspace.getAllBlocks(false);
  for(let block of blocks){
    if(block.type === "text_print"){
      if(block.getInputTargetBlock("TEXT")){
        return true;
      }
    }
  }
  return false;
}

function countValidPrints(){
  const blocks = workspace.getAllBlocks(false);
  let count = 0;

  for(let block of blocks){
    if(block.type === "text_print"){
      if(block.getInputTargetBlock("TEXT")){
        count++;
      }
    }
  }

  return count;
}

// ================= LESSON DEFINITIONS =================

const lessons = {

1:{
  title:'Lesson 1: Print "Hello World"',
  objective:'Use the print block to show "Hello World" in the console.',
  check:()=>{
    const code = Blockly.JavaScript.workspaceToCode(workspace).toLowerCase();
    return code.includes("hello world");
  }
},

2:{
  title:'Lesson 2: Print Anything (Not Blank)',
  objective:'Print any message of your choice using the text print block.',
  check:()=> hasPrintWithValue()
},

3:{
  title:'Lesson 3: Print the Number 5',
  objective:'Use the print block to show the number 5.',
  check:()=>{
    const code = Blockly.JavaScript.workspaceToCode(workspace);
    return code.includes("5");
  }
},

4:{
  title:'Lesson 4: Add 2 + 3',
  objective:'Print the result of 2 + 3 using a math arithmetic block.',
  check:()=>{
    const code = Blockly.JavaScript.workspaceToCode(workspace);
    return code.includes("2 + 3");
  }
},

5:{
  title:'Lesson 5: Print Two Things',
  objective:'Print at least two different messages or numbers.',
  check:()=> countValidPrints() >= 2
},

6:{
  title:'Lesson 6: Print "I Love Coding"',
  objective:'Use the print block to display "I Love Coding".',
  check:()=>{
    const code = Blockly.JavaScript.workspaceToCode(workspace).toLowerCase();
    return code.includes("i love coding");
  }
}

};


// ================= LOAD LESSON =================

function loadLesson(){

  workspace.clear();

  document.getElementById("lessonTitle").innerText =
    lessons[currentLesson].title;

  document.getElementById("lessonObjective").innerText =
    lessons[currentLesson].objective;

  document.getElementById("output").innerText = "";

}


// ================= START LESSON BUTTON =================

document.getElementById("startBtn").addEventListener("click", () => {

  document.getElementById("lessonIntro").style.display = "none";
  document.getElementById("blocklyDiv").style.display = "block";
  document.getElementById("runBtn").style.display = "inline-block";

  workspace = Blockly.inject("blocklyDiv", {
    toolbox: document.getElementById("toolbox")
  });

  loadLesson();

});


// ================= RUN CODE =================

document.getElementById("runBtn").addEventListener("click", function(){

  if(lessons[currentLesson].check()){

    document.getElementById("output").style.color = "#10b981";
    document.getElementById("output").innerText = "Correct!";

    currentLesson++;

    if(currentLesson > 6){
      showCertificate();
    }
    else{
      setTimeout(loadLesson, 800);
    }

  }
  else{

    document.getElementById("output").style.color = "#ef4444";
    document.getElementById("output").innerText = "Not correct. Try again.";

  }

});


// ================= CERTIFICATE =================

function showCertificate(){

  document.getElementById("certificate").style.display = "block";

  let name = prompt("Enter your name for the certificate:");

  document.getElementById("certName").innerText = name || "Student";

  const today = new Date();

  document.getElementById("certDate").innerText =
    "Date: " + today.toLocaleDateString();

}


// ================= DEV CHEAT =================

window.aceblocksSkipToCertificate = function(){
  showCertificate();
};


// CTRL + SHIFT + C shortcut
document.addEventListener("keydown", function(e){

  if(e.ctrlKey && e.shiftKey && e.code === "KeyC"){
    showCertificate();
  }

});

</script>
