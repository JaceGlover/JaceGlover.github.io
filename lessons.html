<script>
window.addEventListener("DOMContentLoaded", function(){

// ================= GLOBALS =================
let workspace = null;
let currentLesson = parseInt(localStorage.getItem("aceblocksLesson")) || 1;

// ================= HELPER FUNCTIONS =================

// Get code from workspace
function getCode(){
  if(!workspace) return "";
  return Blockly.JavaScript.workspaceToCode(workspace);
}

// Run code and capture console output
function runCode(){
  const outputDiv = document.getElementById("output");
  outputDiv.innerText = ""; // clear previous output

  // override console.log
  const originalConsole = console.log;
  console.log = function(msg){
    outputDiv.innerText += msg + "\n";
    originalConsole(msg);
  }

  try{
    eval(getCode());
  }catch(e){
    outputDiv.innerText += "Error: " + e.message;
  }

  // restore console.log
  console.log = originalConsole;
}

// Check if print block exists with value
function hasPrintWithValue(){
  if(!workspace) return false;
  const blocks = workspace.getAllBlocks(false);
  return blocks.some(b => b.type === "text_print" && b.getInputTargetBlock("TEXT"));
}

// Count print blocks with value
function countValidPrints(){
  if(!workspace) return 0;
  return workspace.getAllBlocks(false).filter(b => b.type === "text_print" && b.getInputTargetBlock("TEXT")).length;
}

// ================= LESSON DEFINITIONS =================

const lessons = {

1:{
  title:'Lesson 1: Print "Hello World"',
  objective:'Use the print block to show "Hello World" in the console.',
  check:()=> getCode().toLowerCase().includes("hello world")
},

2:{
  title:'Lesson 2: Print Anything (Not Blank)',
  objective:'Print any message using the text print block.',
  check:()=> hasPrintWithValue()
},

3:{
  title:'Lesson 3: Print the Number 5',
  objective:'Use the print block to show the number 5.',
  check:()=> getCode().includes("5")
},

4:{
  title:'Lesson 4: Add 2 + 3',
  objective:'Print the result of 2 + 3 using a math arithmetic block.',
  check:()=> getCode().includes("2 + 3")
},

5:{
  title:'Lesson 5: Print Two Things',
  objective:'Print at least two different messages or numbers.',
  check:()=> countValidPrints() >= 2
},

6:{
  title:'Lesson 6: Print "I Love Coding"',
  objective:'Use the print block to display "I Love Coding".',
  check:()=> getCode().toLowerCase().includes("i love coding")
}

};

// ================= LOAD LESSON =================

function loadLesson(){
  if(!workspace) return;
  workspace.clear();

  document.getElementById("lessonTitle").innerText = lessons[currentLesson].title;
  document.getElementById("lessonObjective").innerText = lessons[currentLesson].objective;
  document.getElementById("output").innerText = "";

  // Save current lesson to localStorage
  localStorage.setItem("aceblocksLesson", currentLesson);
}

// ================= START LESSONS =================

document.getElementById("startBtn").addEventListener("click", function(){
  document.getElementById("lessonIntro").style.display = "none";
  document.getElementById("blocklyDiv").style.display = "block";
  document.getElementById("runBtn").style.display = "inline-block";

  workspace = Blockly.inject("blocklyDiv", {
    toolbox: document.getElementById("toolbox")
  });

  // Register generator for print block
  Blockly.JavaScript['text_print'] = function(block){
    const msg = Blockly.JavaScript.valueToCode(block,'TEXT',Blockly.JavaScript.ORDER_NONE) || '""';
    return "console.log(" + msg + ");\n";
  };

  loadLesson();
});

// ================= RUN CODE =================

document.getElementById("runBtn").addEventListener("click", function(){
  runCode();

  if(lessons[currentLesson].check()){
    document.getElementById("output").style.color = "#10b981";
    document.getElementById("output").innerText += "\n✅ Correct!";

    currentLesson++;

    if(currentLesson > 6){
      showCertificate();
    }else{
      setTimeout(loadLesson, 800);
    }

  } else {
    document.getElementById("output").style.color = "#ef4444";
    document.getElementById("output").innerText += "\n❌ Not correct. Try again.";
  }
});

// ================= CERTIFICATE =================

function showCertificate(){
  document.getElementById("certificate").style.display = "block";

  let name = prompt("Enter your name for the certificate:");
  document.getElementById("certName").innerText = name || "Student";

  const today = new Date();
  document.getElementById("certDate").innerText =
    "Date: " + today.toLocaleDateString();

  // clear lesson progress
  localStorage.removeItem("aceblocksLesson");
}

// ================= DEV CHEAT =================

window.aceblocksSkipToCertificate = function(){
  showCertificate();
};

// ================= SHORTCUT =================

document.addEventListener("keydown", function(e){
  if(e.ctrlKey && e.shiftKey && e.code === "KeyC"){
    showCertificate();
  }
});

}); // DOMContentLoaded
</script>
