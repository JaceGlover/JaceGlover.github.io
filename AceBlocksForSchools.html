<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AceBlocks for Schools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b0f19;
  color:white;
  overflow:hidden;
}

/* WRAPPER HOLDS BOTH SCREENS */
.wrapper{
  display:flex;
  width:200vw;
  height:100vh;
  transition:transform 1s ease;
}

/* EACH SCREEN */
.screen{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* HERO SCREEN */
#hero{
  background:#0b0f19;
}

/* TYPEWRITER */
#type{
  font-size:3.5rem;
  font-weight:800;
  border-right:3px solid #3b82f6;
  white-space:nowrap;
  overflow:hidden;
}

/* CODE SYMBOL */
#codeSymbol{
  font-size:2rem;
  margin-top:20px;
  opacity:0;
  transform:translateY(20px);
  transition:0.8s ease;
  color:#3b82f6;
}

.show{
  opacity:1 !important;
  transform:translateY(0) !important;
}

/* MAIN PAGE */
#main{
  background:#111827;
  padding:40px;
}

h2{
  font-size:2.2rem;
  margin-bottom:20px;
}

p{
  color:#9ca3af;
  max-width:600px;
}

.features{
  display:flex;
  gap:30px;
  margin-top:40px;
  flex-wrap:wrap;
  justify-content:center;
}

.box{
  background:#1f2937;
  padding:25px;
  border-radius:10px;
  width:220px;
}
</style>
</head>

<body>

<div class="wrapper" id="wrapper">

  <!-- SCREEN 1 (INTRO) -->
  <div class="screen" id="hero">
    <div id="type"></div>
    <div id="codeSymbol">&lt;/&gt;</div>
  </div>

  <!-- SCREEN 2 (MAIN PAGE) -->
  <div class="screen" id="main">
    <h2>AceBlocks for Schools</h2>
    <p>
      AceBlocks helps students learn coding through visual building and real code output.
      Perfect for beginners and student-led environments.
    </p>

    <div class="features">
      <div class="box">No experience required</div>
      <div class="box">Student-led learning</div>
      <div class="box">Real coding skills</div>
      <div class="box">Runs as a club or class</div>
    </div>
  </div>

</div>

<script>
const text = "AceBlocks";
let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("type").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 100);
  } else {
    setTimeout(() => {
      document.getElementById("codeSymbol").classList.add("show");

      // SLIDE LEFT AFTER SYMBOL
      setTimeout(() => {
        document.getElementById("wrapper").style.transform = "translateX(-100vw)";
        document.body.style.overflow = "auto"; // allow scrolling after
      }, 800);

    }, 300);
  }
}

typeWriter();
</script>

</body>
</html>
