<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AceBlocks for Schools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b0f19;
  color:white;
  overflow-x:hidden;
}

/* HERO SCREEN */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* TYPEWRITER TEXT */
#type{
  font-size:3.5rem;
  font-weight:800;
  border-right:3px solid #3b82f6;
  white-space:nowrap;
  overflow:hidden;
}

/* CODE SYMBOL */
#codeSymbol{
  font-size:2rem;
  margin-top:20px;
  opacity:0;
  transform:translateY(20px);
  transition:0.8s ease;
  color:#3b82f6;
}

/* SHOW CLASS */
.show{
  opacity:1 !important;
  transform:translateY(0) !important;
}

/* CONTENT SECTION */
.section{
  padding:80px 20px;
  text-align:center;
  background:#111827;
}

h2{
  font-size:2rem;
  margin-bottom:20px;
}

p{
  color:#9ca3af;
  max-width:700px;
  margin:auto;
}

.features{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:30px;
  margin-top:40px;
}

.box{
  background:#1f2937;
  padding:25px;
  border-radius:10px;
  width:250px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div id="type"></div>
  <div id="codeSymbol">&lt;/&gt;</div>
</div>

<!-- CONTENT -->
<div class="section">
  <h2>AceBlocks for Schools</h2>
  <p>
    AceBlocks is a beginner-friendly coding platform designed to help students learn programming through visual building and real code output.
  </p>

  <div class="features">
    <div class="box">No experience required</div>
    <div class="box">Student-led learning</div>
    <div class="box">Real coding skills</div>
    <div class="box">Perfect for clubs or classrooms</div>
  </div>
</div>

<script>
const text = "AceBlocks";
let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("type").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 100);
  } else {
    // show </> after typing
    setTimeout(() => {
      document.getElementById("codeSymbol").classList.add("show");
    }, 300);
  }
}

typeWriter();
</script>

</body>
</html>
