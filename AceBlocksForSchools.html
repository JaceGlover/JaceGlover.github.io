<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Under Construction</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
    }

    h1 {
      font-size: 60px;
      color: #3b82f6;
      margin-bottom: 20px;
      animation: bounce 1.5s infinite;
    }

    p {
      font-size: 20px;
      color: #94a3b8;
      margin-bottom: 40px;
    }

    .loader {
      border: 6px solid #1e293b;
      border-top: 6px solid #3b82f6;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin-bottom: 30px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .contact {
      margin-top: 20px;
      font-size: 16px;
      color: #3b82f6;
      text-decoration: none;
      border: 2px solid #3b82f6;
      padding: 10px 20px;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
    }

    .contact:hover {
      background: #3b82f6;
      color: white;
    }
  </style>
</head>
<body>

  <div class="loader"></div>
  <h1>Under Construction</h1>
  <p>Our website is currently being worked on. We’ll be back soon!</p>
  <a class="contact" href="mailto:contact@yourdomain.com">Contact Us</a>

</body>
</html>
