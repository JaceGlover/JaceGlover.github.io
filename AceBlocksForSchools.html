<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AceBlocks</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  position: relative;
  overflow: hidden;
}
header {
  background-color: #111827;
  color: #f9fafb;
  padding: 28px 40px;
  text-align: left;
  font-size: 48px;
  font-weight: 900;
  box-shadow: 0 8px 28px rgba(0,0,0,0.6);
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 10;
  border-bottom-left-radius: 16px;
  border-bottom-right-radius: 16px;
  letter-spacing: 1.2px;
}
.container {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  width: 80%;
  max-width: 1200px;
  margin-top: 180px;
}
.box {
  background: #fef3c7;
  color: #1f2937;
  width: 380px;
  height: 540px;
  border: 6px solid #f59e0b;
  border-radius: 32px;
  padding: 24px;
  box-sizing: border-box;
  font-size: 32px;
  font-weight: 800;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  transition: transform 0.35s ease, box-shadow 0.35s ease;
}
.box:hover {
  transform: translateY(-10px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.45);
}
.left-box::before, .right-box::before {
  display: block;
  text-decoration: underline;
  font-size: 36px;
  font-weight: 900;
  color: #1f2937;
  margin-bottom: 24px;
  text-align: center;
}
.left-box::before { content: 'Year 7-8'; }
.right-box::before { content: 'Year 9-11'; }
.left-box::after, .right-box::after {
  content: '';
  display: block;
  width: 90%;
  height: 6px;
  background-color: #f59e0b;
  border-radius: 4px;
  margin-bottom: 36px;
  align-self: center;
}
a.square-link {
  display: block;
  text-decoration: none;
  position: relative;
}
.middle-square {
  width: 240px;
  height: 240px;
  background: linear-gradient(145deg, #2563eb, #3b82f6);
  border: 6px solid #1e3a8a;
  border-radius: 32px;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 32px;
  font-weight: 900;
  color: #fef3c7;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}
.middle-square:hover {
  transform: scale(1.2);
  box-shadow: 0 20px 50px rgba(37,99,235,0.7);
  background: linear-gradient(145deg, #3b82f6, #60a5fa);
}
.center-content {
  position: absolute;
  top: 8%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  font-size: 54px;
  font-weight: 900;
  color: #fef3c7;
  background: linear-gradient(135deg, #f59e0b, #f97316);
  padding: 36px 72px;
  border-radius: 32px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  line-height: 1.3;
  max-width: 900px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.5);
  letter-spacing: 1px;
}
</style>
</head>
<body>
  <header>AceBlocks - Coding for the Future</header>

  <div class="container">
    <div class="box left-box">
      <a href="juniorsch.html" class="square-link">
        <div class="middle-square">Start</div>
      </a>
    </div>

    <div class="box right-box">
      <a href="seniorsch.html" class="square-link">
        <div class="middle-square">Start</div>
      </a>
    </div>
  </div>

  <div class="center-content">Learn, Build, Code — Your Future Awaits!</div>
</body>
</html>
