<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AceBlocks for Schools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b0f19;
  color:white;
  overflow:hidden;
  scroll-behavior:smooth;
}

/* WRAPPER */
.wrapper{
  display:flex;
  width:200vw;
  height:100vh;
  transition:transform 1s ease;
}

/* SCREENS */
.screen{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* TYPE */
#type{
  font-size:3.5rem;
  font-weight:800;
  border-right:3px solid #3b82f6;
  white-space:nowrap;
  overflow:hidden;
}

/* SYMBOL */
#codeSymbol{
  font-size:2rem;
  margin-top:20px;
  opacity:0;
  transform:translateY(20px);
  transition:0.8s ease;
  color:#3b82f6;
}

.show{
  opacity:1 !important;
  transform:translateY(0) !important;
}

/* MAIN SCREEN */
#main{
  background:#111827;
  padding:40px;
}

/* BUTTON */
.button{
  margin-top:40px;
  padding:14px 28px;
  background:#3b82f6;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.button:hover{
  background:#2563eb;
  transform:translateY(-2px);
}

/* SECOND SECTION */
#deepSection{
  height:100vh;
  background:#0b0f19;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;
}

.features{
  display:flex;
  gap:30px;
  margin-top:30px;
  flex-wrap:wrap;
  justify-content:center;
}

.box{
  background:#1f2937;
  padding:25px;
  border-radius:10px;
  width:220px;
}
</style>
</head>

<body>

<div class="wrapper" id="wrapper">

  <!-- INTRO -->
  <div class="screen">
    <div id="type"></div>
    <div id="codeSymbol">&lt;/&gt;</div>
  </div>

  <!-- MAIN -->
  <div class="screen" id="main">
    <h2>AceBlocks for Schools</h2>
    <p>Helping students learn coding through visual building and real code output.</p>

    <button class="button" onclick="goDown()">Start Your Journey ↓</button>
  </div>

</div>

<!-- FULL PAGE BELOW -->
<div id="deepSection">
  <h2>Why Schools Choose AceBlocks</h2>

  <div class="features">
    <div class="box">No experience needed</div>
    <div class="box">Student-led</div>
    <div class="box">Real coding skills</div>
    <div class="box">Easy to run</div>
  </div>
</div>

<script>
const text = "AceBlocks";
let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("type").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 100);
  } else {
    setTimeout(() => {
      document.getElementById("codeSymbol").classList.add("show");

      setTimeout(() => {
        document.getElementById("wrapper").style.transform = "translateX(-100vw)";
        document.body.style.overflow = "auto";
      }, 800);

    }, 300);
  }
}

function goDown(){
  document.getElementById("deepSection").scrollIntoView({
    behavior: "smooth"
  });
}

typeWriter();
</script>

</body>
</html>
